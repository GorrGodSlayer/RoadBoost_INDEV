# RoadBoost Configuration

# -------------------------------------------------------------------------
# ROAD SETTINGS
# -------------------------------------------------------------------------

# Blocks used to build the road, with their relative weights.
# Format: MATERIAL:WEIGHT  (higher weight = more common)
road-blocks:
  - COBBLESTONE:40
  - STONE:30
  - GRAVEL:20
  - COARSE_DIRT:10

# How wide the road is on each side of the player's path.
# 0 = only the block walked on, 1 = 3 blocks wide, 2 = 5 blocks wide, etc.
road-width: 1

# How many blocks around the player to remove when using /road undo.
undo-radius: 5

# How many blocks tall to carve through hills when recording a road.
# Blocks above the road surface up to this height will be removed.
road-corridor-height: 4

# Radius (in blocks) around the player to clear vegetation while recording.
# Uses a circular area. Set to 0 to disable.
road-forest-radius: 5

# Particle shown on each block as the player records a road.
# Set to NONE to disable.
record-particle: HAPPY_VILLAGER

# Particle shown when the road is finalised with /road stop.
place-particle: HAPPY_VILLAGER

# Sound played when /road stop is run.
place-sound: BLOCK_NOTE_BLOCK_PLING

# -------------------------------------------------------------------------
# BRIDGE SETTINGS
# -------------------------------------------------------------------------

# Folder (inside the plugin data folder) where .schem files are stored.
# Place your schematic files here and reference them by name (without extension).
bridge-schematics-folder: schematics

# How many blocks around the player to remove when undoing a bridge section.
bridge-undo-radius: 5

# Particle shown while recording a bridge.
bridge-record-particle: END_ROD

# Override the module repeat length (in blocks).
# Set to 0 to auto-detect from the schematic Z size.
# Use this if modules overlap or have a gap between them.
bridge-module-length: 0

# How many blocks above the bridge surface to clear vegetation (trees, leaves, etc.)
# Increase this if custom trees are very tall.
bridge-clear-height: 32

# -------------------------------------------------------------------------
# BOOST SETTINGS
# -------------------------------------------------------------------------

# Potion effects applied when a player walks on a road OR bridge.
effects:
  - type: SPEED
    amplifier: 1
    duration: 40
  - type: JUMP_BOOST
    amplifier: 0
    duration: 40

# How often (in ticks) to check if a player is on a road/bridge and reapply effects.
boost-check-interval: 20

# -------------------------------------------------------------------------
# BLUEMAP INTEGRATION
# -------------------------------------------------------------------------

# Whether to show roads and bridges on BlueMap.
# Requires BlueMap to be installed. Safe to leave true if BlueMap is absent.
bluemap-enabled: true

# Color of road lines on BlueMap (hex, with alpha: AARRGGBB)
bluemap-road-color: "#FF888888"

# Color of bridge lines on BlueMap
bluemap-bridge-color: "#FF4488FF"

# Width of the line in pixels on the map
bluemap-line-width: 3

# -------------------------------------------------------------------------
# BLUEMAP SETTINGS
# -------------------------------------------------------------------------

# Color of road lines on BlueMap (hex)
bluemap-road-color: "#FF0000"

# Color of bridge lines on BlueMap (hex)
bluemap-bridge-color: "#FF0000"

# Width of road lines
bluemap-road-line-width: 3.0

# Width of bridge parallel lines
bluemap-bridge-line-width: 2.0

# How far apart the two parallel bridge lines are (in blocks)
bluemap-bridge-parallel-offset: 2.5
