name: RoadBoost
version: 1.0.0
main: com.roadboost.RoadBoostPlugin
api-version: '1.21'
description: Create roads and bridges by walking, with BlueMap integration.
depend: [WorldEdit]
softdepend: [BlueMap]

permissions:
  roadboost.build:
    description: Allows a player to create and remove roads and bridges.
    default: op
  roadboost.admin:
    description: Allows access to admin commands like reload.
    default: op

commands:
  road:
    description: Main road management command.
    usage: /road <start <from>|stop <to>|undo|reload>
    permission: roadboost.build
  bridge:
    description: Build a bridge by walking.
    usage: /bridge <start <schematic>|stop|undo|list>
    permission: roadboost.build
