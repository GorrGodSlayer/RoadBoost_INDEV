name: RoadBoost
version: 1.0.0
main: com.roadboost.RoadBoostPlugin
api-version: '1.21'
description: Create roads and bridges by walking and give players boosts when they walk on them.
depend: [WorldEdit]

permissions:
  roadboost.build:
    description: Allows a player to create and remove roads and bridges.
    default: op
  roadboost.admin:
    description: Allows access to admin commands like reload.
    default: op

commands:
  road:
    description: Main road management command.
    usage: /road <start|stop|undo|reload>
    permission: roadboost.build
  bridge:
    description: Start or stop building a bridge by walking.
    usage: /bridge <start|stop|list>
    permission: roadboost.build
